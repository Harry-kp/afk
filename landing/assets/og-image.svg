<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#1f1f23"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Aurora effect -->
  <ellipse cx="200" cy="100" rx="400" ry="300" fill="url(#aurora1)" opacity="0.6"/>
  <ellipse cx="1000" cy="500" rx="350" ry="250" fill="url(#aurora1)" opacity="0.4"/>
  
  <!-- Icon emoji -->
  <text x="600" y="220" font-size="120" text-anchor="middle" dominant-baseline="middle">👀</text>
  
  <!-- App name -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white" text-anchor="middle">AFK</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a1a1aa" text-anchor="middle">Step away from your keyboard</text>
  
  <!-- Subtitle -->
  <text x="600" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#71717a" text-anchor="middle">Break reminder for developers • macOS</text>
  
  <!-- Golden accent line -->
  <rect x="500" y="510" width="200" height="4" rx="2" fill="url(#gold)"/>
</svg>


# .github/workflows/release.yml
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Afk v__VERSION__'
          releaseBody: |
            ## Installation

            ### Homebrew (Recommended)
            ```bash
            brew tap Harry-kp/tap
            brew install --cask afk
            ```

            ### Direct Download
            Download the DMG below for your architecture.

            **First launch:** Right-click the app → Open → Open
            (Required for apps outside the App Store)
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          DMG_PATH="src-tauri/target/universal-apple-darwin/release/bundle/dmg/Afk_${VERSION}_universal.dmg"
          
          # Create release in public repo
          gh release create "v${VERSION}" \
            --repo Harry-kp/afk-releases \
            --title "Afk v${VERSION}" \
            --notes "Release v${VERSION} - Download for macOS" \
            "$DMG_PATH"
          
          echo "✅ Uploaded to afk-releases repo"

      - name: Trigger Homebrew cask update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-homebrew.yml --repo Harry-kp/homebrew-tap
